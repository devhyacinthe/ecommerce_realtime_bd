name: ecommerce-realtime

x-logging: &default-logging
  driver: json-file
  options: { max-size: "10m", max-file: "3" }

services:
  kafka:
    image: apache/kafka:3.8.0
    logging: *default-logging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
    volumes: [kafka_data:/var/lib/kafka/data]
    mem_limit: 1800m
    networks: [ecom]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    logging: *default-logging
    environment:
      CLICKHOUSE_DB: ecommerce
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 2500m
    networks: [ecom]

  producer:
    build: ./producer
    logging: *default-logging
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: ecommerce_events
      EVENTS_PER_SECOND: ${EVENTS_PER_SECOND}
    depends_on: [kafka]
    mem_limit: 300m
    restart: unless-stopped
    networks: [ecom]

  spark:
    build: ./spark
    logging: *default-logging
    command: >
      spark-submit --master local[*] --driver-memory 2g
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3
      /app/jobs/streaming_job.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: ecommerce_events
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ecommerce
      BRONZE_PATH: /data/bronze/events
      CHECKPOINT_PATH: /data/checkpoints
    volumes:
      - ./data:/data
      - ivy_cache:/root/.ivy2
    depends_on: [kafka, clickhouse]
    mem_limit: 4g
    restart: unless-stopped
    networks: [ecom]

  grafana:
    image: grafana/grafana:11.2.0
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [clickhouse]
    mem_limit: 600m
    networks: [ecom]

networks: { ecom: {} }
volumes: { kafka_data: {}, clickhouse_data: {}, grafana_data: {}, ivy_cache: {} }